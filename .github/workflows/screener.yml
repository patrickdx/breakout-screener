name: Daily Breakout Screener

on:
  schedule:
    # 21:00 UTC = 5pm EDT (summer) / 4pm EST (winter). GitHub Actions schedule
    # lag may push actual run up to ~1h later.
    - cron: '0 21 * * 1-5'
  workflow_dispatch: {}  # allow manual run from the Actions tab

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # needed to commit the daily xlsx back to the repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Nasdaq breakout screener
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python momentum_update.py \
            --nasdaq \
            --output-dir "archive/$(date -u +%Y/%m)" \
            --sheet-id "${{ secrets.SHEET_ID }}"

      # - name: Run Hang Seng breakout screener
      #   env:
      #     GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      #   run: |
      #     python momentum_update.py \
      #       --hangseng \
      #       --output-dir "archive/$(date -u +%Y/%m)" \
      #       --sheet-id "${{ secrets.SHEET_ID }}"

      - name: Commit archived xlsx
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/
          if git diff --cached --quiet; then
            echo "No new archive file to commit."
            exit 0
          fi
          git commit -m "Archive screener output: $(date -u +%Y-%m-%d)"
          # Retry with rebase in case main moved during the run (re-runs of
          # this workflow, or concurrent human pushes). The archive file is
          # date-stamped so any second push rebases cleanly with no conflict.
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push attempt $i rejected; pulling --rebase and retrying"
            git pull --rebase origin main
            sleep $((i * 3))
          done
          echo "::error::Failed to push archive after 5 attempts"
          exit 1
