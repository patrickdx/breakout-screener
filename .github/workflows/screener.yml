name: Daily Breakout Screener

on:
  schedule:
    # 21:00 UTC — after the US close; Asia and Europe closed hours earlier,
    # so this is one clean global end-of-day snapshot. GitHub schedule lag
    # may push the actual run up to ~1h later.
    - cron: '0 21 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: screener
  cancel-in-progress: false

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -q

      - name: Run screener
        run: python screener.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.csv docs/data.json
          git diff --cached --quiet && exit 0
          git commit -m "Screener run: $(date -u +%F)"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase
          done
          exit 1
