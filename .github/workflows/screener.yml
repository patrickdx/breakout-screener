name: Daily Breakout Screener

on:
  schedule:
    # 21:00 UTC = 5pm EDT (summer) / 4pm EST (winter). GitHub Actions schedule
    # lag may push actual run up to ~1h later.
    - cron: '0 21 * * 1-5'
  workflow_dispatch: {}

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run breakout screener
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python momentum_update.py
