name: Daily Breakout Screener

on:
  schedule:
    # 21:00 UTC weekdays = ~5pm ET (after US market close, regardless of DST)
    - cron: '0 21 * * 1-5'
  workflow_dispatch: {}  # allow manual run from the Actions tab

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # needed to commit the daily xlsx back to the repo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Nasdaq breakout screener
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python momentum_update.py \
            --nasdaq \
            --output-dir "archive/$(date -u +%Y/%m)" \
            --sheet-id "${{ secrets.SHEET_ID }}"

      # - name: Run Hang Seng breakout screener
      #   env:
      #     GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      #   run: |
      #     python momentum_update.py \
      #       --hangseng \
      #       --output-dir "archive/$(date -u +%Y/%m)" \
      #       --sheet-id "${{ secrets.SHEET_ID }}"

      - name: Commit archived xlsx
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive/
          if git diff --cached --quiet; then
            echo "No new archive file to commit."
          else
            git commit -m "Archive screener output: $(date -u +%Y-%m-%d)"
            git push
          fi
